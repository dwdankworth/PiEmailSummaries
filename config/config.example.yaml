vip_senders:
  - "boss@company.com"
  - "*@important-client.com"

skip_labels:
  - "CATEGORY_PROMOTIONS"
  - "CATEGORY_SOCIAL"
  - "CATEGORY_UPDATES"

priority_keywords:
  - "urgent"
  - "deadline"
  - "action required"

digest_schedule:
  - "0 8 * * *"
  - "0 16 * * *"

# How often (in minutes) the summarizer checks for and processes pending emails.
summarizer_interval_minutes: 2

# Legacy cron-based summarizer schedule (no longer used by default;
# the summarizer now polls on summarizer_interval_minutes).
# summarizer_schedule:
#   - "0 8 * * *"
#   - "0 13 * * *"
#   - "0 18 * * *"

# Must match OLLAMA_MODEL env var in docker-compose.yml so the model is auto-pulled.
ollama_model: "gemma3:4b"
ollama_url: "http://ollama:11434/api/generate"
ollama_timeout_seconds: 180
ollama_num_ctx: 8192
# How long to keep the model loaded in memory after a request.
# "0" = unload immediately (saves RAM/VRAM between cycles), "5m" = 5 minutes, "-1" = never unload.
ollama_keep_alive: "0"
prompt_body_max_chars: 6000

telegram_bot_token: "replace-me"
telegram_chat_id: "replace-me"

gmail_user_email: "replace-me@gmail.com"
gmail_max_results: 25
summarizer_batch_size: 20
fetch_interval_minutes: 20

# Your name and pronouns — used in the AI prompt so summaries refer to you correctly.
# If omitted, the prompt uses neutral language (they/them or second person).
user_name: ""
user_pronouns: ""

# Timezone for cron schedules (summarizer_schedule, digest_schedule).
# Leave empty or omit to auto-detect from TZ env var / system timezone.
# Examples: "America/Los_Angeles", "US/Eastern", "Europe/London", "UTC"
# timezone: "America/Los_Angeles"

prompt_template: |
  You are an email triage assistant.{user_context} Analyze the following email and respond with ONLY valid JSON, no other text.

  Priority scale (use these definitions — do NOT inflate scores):
    5 = Requires action within hours (e.g., deadline today, outage, security alert)
    4 = Requires action within 1-2 days (e.g., approval request, meeting confirmation)
    3 = Informational but personally relevant (e.g., project update from a colleague)
    2 = General information, newsletters, news digests, automated notifications
    1 = Marketing, social media notifications, bulk mail that passed filters

  Rules:
  - Base your priority ONLY on the email content and the scale above.
  - Do NOT factor VIP status into your priority score — a VIP boost is applied automatically after your rating.
  - If VIP sender is False below, do NOT mention VIP status in your priority_reason.
  - Do NOT infer VIP status from the sender name or domain. Only the VIP sender field reflects whether this sender is on the user's VIP list.
  - Newsletters, news digests, and automated notifications should be priority 2 or lower unless they contain a personal action item.

  Context:
  - VIP sender: {is_vip}
  - Direct recipient (To/CC): {is_direct}
  - Thread depth: {thread_depth}
  - Priority keywords found: {matched_keywords}

  Email:
  From: {sender}
  To: {recipients}
  Subject: {subject}
  Date: {date}
  Body:
  {body_text}

  Respond with this exact JSON structure:
  {{
    "summary": "2-3 sentence summary of the email content and any action items",
    "priority": <integer 1-5 using the scale above>,
    "categories": ["list", "of", "relevant", "tags"],
    "priority_reason": "One sentence explaining why you assigned this priority based on email content"
  }}
